# =============================================================================
#  Cloud Build CI/CD — SeleEvent Next.js Frontend
#
#  Triggers:
#    - Push to main or doku branch
#    - Manual: gcloud builds submit --config cloudbuild.yaml
#
#  Artifact Registry:
#    Repository: eventku | Image: selevent-web
#    Full path:  asia-southeast1-docker.pkg.dev/PROJECT_ID/eventku/selevent-web
#
#  Cloud Run:
#    Service:    selevent-web  (or _SERVICE_NAME substitution)
#    Region:     asia-southeast1
#    VPC:        selevent-vpc
#    Cloud SQL:  PROJECT_ID:asia-southeast1:selevent-db
# =============================================================================

steps:
  # ── Step 1: Install dependencies ──────────────────────────────────────────
  - name: 'node:20-slim'
    id: 'install-deps'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Installing dependencies (bun) ==="
        apt-get update -qq && apt-get install -y -qq curl unzip > /dev/null 2>&1
        curl -fsSL https://bun.sh/install | bash > /dev/null 2>&1
        export PATH="$$HOME/.bun/bin:$$PATH"
        bun --version
        bun install --frozen-lockfile 2>&1 || {
          echo "bun install failed, falling back to npm ci"
          npm ci --legacy-peer-deps
        }
        echo "✅ Dependencies installed successfully"

  # ── Step 2: Run linting ───────────────────────────────────────────────────
  - name: 'node:20-slim'
    id: 'lint'
    waitFor: ['install-deps']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Running ESLint ==="
        npx eslint . --max-warnings=0 2>&1 || {
          echo "❌ Linting failed"
          exit 1
        }
        echo "✅ Linting passed"

  # ── Step 4: Build Next.js application ─────────────────────────────────────
  - name: 'node:20-slim'
    id: 'build-nextjs'
    waitFor: ['lint']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Building Next.js application ==="

        # Set all NEXT_PUBLIC_* build-time environment variables
        export NEXT_TELEMETRY_DISABLED=1
        export NEXT_PUBLIC_API_URL="$_NEXT_PUBLIC_API_URL"
        export NEXT_PUBLIC_USE_MOCK="false"
        export NEXT_PUBLIC_DOKU_ENVIRONMENT="production"
        export NEXT_PUBLIC_DOKU_API_BASE_URL="https://api.doku.com"
        export NEXT_PUBLIC_DOKU_CHECKOUT_URL="https://checkout.doku.com"
        export NEXT_PUBLIC_DOKU_CLIENT_ID="$_NEXT_PUBLIC_DOKU_CLIENT_ID"
        export NEXT_PUBLIC_DOKU_NOTIFICATION_URL="$_NEXT_PUBLIC_DOKU_NOTIFICATION_URL"
        export NEXT_PUBLIC_DOKU_FINISH_URL="$_NEXT_PUBLIC_DOKU_FINISH_URL"
        export NEXT_PUBLIC_DOKU_ERROR_URL="$_NEXT_PUBLIC_DOKU_ERROR_URL"
        export NEXT_PUBLIC_DOKU_UNPAYMENT_URL="$_NEXT_PUBLIC_DOKU_UNPAYMENT_URL"
        export NEXT_PUBLIC_GOOGLE_CLIENT_ID="$_NEXT_PUBLIC_GOOGLE_CLIENT_ID"
        export NEXT_PUBLIC_PLATFORM_FEE_PERCENTAGE="5"
        export NEXT_PUBLIC_SETTLEMENT_DAYS="7"

        echo "Build args:"
        echo "  NEXT_PUBLIC_API_URL=$$NEXT_PUBLIC_API_URL"
        echo "  NEXT_PUBLIC_DOKU_ENVIRONMENT=$$NEXT_PUBLIC_DOKU_ENVIRONMENT"
        echo "  NEXT_PUBLIC_DOKU_CLIENT_ID=$$NEXT_PUBLIC_DOKU_CLIENT_ID"
        echo "  NEXT_PUBLIC_GOOGLE_CLIENT_ID=$$NEXT_PUBLIC_GOOGLE_CLIENT_ID"

        npm run build 2>&1 || {
          echo "❌ Next.js build failed"
          exit 1
        }
        echo "✅ Next.js build completed successfully"

  # ── Step 5: Build Docker image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    waitFor: ['build-nextjs']
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg=NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '--build-arg=NEXT_PUBLIC_USE_MOCK=false'
      - '--build-arg=NEXT_PUBLIC_DOKU_ENVIRONMENT=production'
      - '--build-arg=NEXT_PUBLIC_DOKU_API_BASE_URL=https://api.doku.com'
      - '--build-arg=NEXT_PUBLIC_DOKU_CHECKOUT_URL=https://checkout.doku.com'
      - '--build-arg=NEXT_PUBLIC_DOKU_CLIENT_ID=$_NEXT_PUBLIC_DOKU_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_DOKU_NOTIFICATION_URL=$_NEXT_PUBLIC_DOKU_NOTIFICATION_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_FINISH_URL=$_NEXT_PUBLIC_DOKU_FINISH_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_ERROR_URL=$_NEXT_PUBLIC_DOKU_ERROR_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_UNPAYMENT_URL=$_NEXT_PUBLIC_DOKU_UNPAYMENT_URL'
      - '--build-arg=NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_NEXT_PUBLIC_GOOGLE_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_PLATFORM_FEE_PERCENTAGE=5'
      - '--build-arg=NEXT_PUBLIC_SETTLEMENT_DAYS=7'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:latest'
      - '.'

  # ── Step 6: Push Docker image to Artifact Registry ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    waitFor: ['docker-build']
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME']

  # ── Step 7: Deploy to Cloud Run ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloudrun'
    waitFor: ['docker-push']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Deploying to Cloud Run ==="
        echo "  Service:   $_SERVICE_NAME"
        echo "  Region:    $_REGION"
        echo "  Image:     $_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:$SHORT_SHA"
        echo "  Instance:  $PROJECT_ID:$_REGION:$_INSTANCE_NAME"
        echo "  VPC:       $_VPC_CONNECTOR"

        gcloud run deploy $_SERVICE_NAME \
          --image=$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:$SHORT_SHA \
          --region=$_REGION \
          --platform=managed \
          --cpu=2 \
          --memory=4Gi \
          --min-instances=2 \
          --max-instances=100 \
          --concurrency=80 \
          --timeout=300 \
          --port=3000 \
          --vpc-connector=$_VPC_CONNECTOR \
          --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME \
          --set-secrets=\
          DATABASE_URL=database-url:latest,\
          REDIS_URL=redis-url:latest,\
          DOKU_CLIENT_ID=doku-client-id:latest,\
          DOKU_SHARED_KEY=doku-shared-key:latest,\
          DOKU_PRIVATE_KEY=doku-private-key:latest,\
          JWT_SECRET=jwt-secret:latest,\
          NEXTAUTH_SECRET=nextauth-secret:latest \
          --set-env-vars=NODE_ENV=production \DATABASE_HOST=/cloudsql/$PROJECT_ID:$_REGION:$_INSTANCE_NAME \
          --allow-unauthenticated \
          --no-cpu-throttling

        echo "✅ Deployed to Cloud Run successfully"
        SERVICE_URL=$(gcloud run services describe $_SERVICE_NAME --region=$_REGION --format='value(status.url)')
        echo "  URL: $$SERVICE_URL"

  # ── Step 8: Run database migrations via Cloud SQL proxy ───────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'db-migrate'
    waitFor: ['deploy-cloudrun']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "=== Running database migrations ==="

        # Install Cloud SQL Proxy
        wget -qO cloud_sql_proxy https://storage.googleapis.com/cloudsql-proxy/v2.14.0/cloud_sql_proxy.linux.amd64
        chmod +x cloud_sql_proxy

        # Start Cloud SQL Proxy in background
        ./cloud_sql_proxy \
          --instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME=tcp:5432 \
          --private-ip &
        PROXY_PID=$!

        # Wait for proxy to be ready
        echo "Waiting for Cloud SQL Proxy..."
        for i in $(seq 1 30); do
          if nc -z 127.0.0.1 5432 2>/dev/null; then
            echo "Cloud SQL Proxy is ready"
            break
          fi
          sleep 1
        done

        # Get DATABASE_URL secret (contains connection string with password)
        DATABASE_URL=$(gcloud secrets versions access latest --secret=database-url 2>/dev/null || echo "")

        if [ -z "$$DATABASE_URL" ]; then
          echo "⚠️  DATABASE_URL secret not found, constructing from components..."
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=database-password 2>/dev/null || echo "")
          if [ -n "$$DB_PASSWORD" ]; then
            export DATABASE_URL="postgresql://eventku:$${DB_PASSWORD}@127.0.0.1:5432/eventku?sslmode=no-verify"
          else
            echo "❌ Cannot determine DATABASE_URL. Skipping migrations."
            kill $$PROXY_PID 2>/dev/null
            exit 0
          fi
        else
          # Replace the host with localhost for proxy connection
          export DATABASE_URL=$(echo "$$DATABASE_URL" | sed 's|@[^/]*|@127.0.0.1:5432|')
        fi

        echo "Running: npx prisma migrate deploy"
        npx prisma migrate deploy 2>&1 || {
          echo "⚠️  Prisma migrate deploy failed — the app may still work if schema is unchanged"
          echo "   Check the error above. If it says 'already applied', this is safe to ignore."
        }

        # Clean up
        kill $$PROXY_PID 2>/dev/null
        echo "✅ Database migration step completed"

  # ── Step 9: Send notification (success) ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'notify-success'
    waitFor: ['db-migrate']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=========================================="
        echo "✅ BUILD & DEPLOY SUCCESSFUL"
        echo "=========================================="
        echo "  Service:   $_SERVICE_NAME"
        echo "  Region:    $_REGION"
        echo "  Image:     $_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:$SHORT_SHA"
        echo "  Commit:    $SHORT_SHA"
        echo "  Branch:    $BRANCH_NAME"
        echo "=========================================="

        # Optional: Send Slack notification
        # Uncomment and set _SLACK_WEBHOOK_URL substitution variable
        # if [ -n "$_SLACK_WEBHOOK_URL" ]; then
        #   curl -s -X POST "$_SLACK_WEBHOOK_URL" \
        #     -H 'Content-type: application/json' \
        #     -d "{
        #       \"text\": \"✅ *SeleEvent Deploy Success*\",
        #       \"blocks\": [
        #         {
        #           \"type\": \"section\",
        #           \"text\": {
        #             \"type\": \"mrkdwn\",
        #             \"text\": \"✅ *SeleEvent $_SERVICE_NAME deployed successfully*\n*Region:* $_REGION\n*Commit:* \`$SHORT_SHA\`\n*Branch:* \`$BRANCH_NAME\`\n*Triggered by:* $$COMMIT_AUTHOR\"
        #           }
        #         }
        #       ]
        #     }"
        #   echo "Slack notification sent"
        # fi

# ── Images to push via Cloud Build's built-in mechanism ─────────────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/$_SERVICE_NAME:latest'

# ── Substitution variables (override in trigger settings) ──────────────────
substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: selevent-web
  _INSTANCE_NAME: selevent-db
  _VPC_CONNECTOR: selevent-vpc
  _NEXT_PUBLIC_API_URL: ''
  _NEXT_PUBLIC_DOKU_CLIENT_ID: ''
  _NEXT_PUBLIC_DOKU_NOTIFICATION_URL: ''
  _NEXT_PUBLIC_DOKU_FINISH_URL: ''
  _NEXT_PUBLIC_DOKU_ERROR_URL: ''
  _NEXT_PUBLIC_DOKU_UNPAYMENT_URL: ''
  _NEXT_PUBLIC_GOOGLE_CLIENT_ID: ''
  _SLACK_WEBHOOK_URL: ''

# ── Build options ──────────────────────────────────────────────────────────
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# ── Build timeout ──────────────────────────────────────────────────────────
timeout: '1200s'

# =============================================================================
#  Cloud Build Configuration — EVENTKU Golang Backend API
#
#  Triggers:
#    - Push to main branch
#    - Manual: gcloud builds submit --config gcp/cloudbuild-backend.yaml
#
#  Artifact Registry:
#    Repository: eventku (the AR Docker repo, NOT eventku-api-staging)
#    Image name: eventku-api-staging (a Docker image within the eventku repo)
#    Full path:  asia-southeast2-docker.pkg.dev/eventku-494416/eventku/eventku-api-staging
#
#  IMPORTANT: The Artifact Registry URL in console shows:
#    /artifacts/docker/PROJECT/REGION/REPOSITORY = eventku
#    eventku-api-staging and eventku-web-staging are IMAGES, not repositories!
# =============================================================================

steps:
  # ── Build Go binary (verification + version stamp) ─────────────────────────
  - name: 'golang:1.24'
    id: 'build-binary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd backend
        echo "=== Running go mod tidy ==="
        GOTOOLCHAIN=local go mod tidy -go=1.24 2>&1 || { echo "❌ go mod tidy FAILED"; exit 1; }
        echo "=== Running go mod download ==="
        go mod download 2>&1 || { echo "❌ go mod download FAILED"; exit 1; }
        echo "=== Building static binary (CGO_ENABLED=0) ==="
        echo "   Image tag: $_SHORT_SHA"
        GOTOOLCHAIN=local CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.version=$_SHORT_SHA" \
          -o /workspace/eventku-api ./cmd/server 2>&1 || { echo "❌ go build FAILED"; exit 1; }
        echo "✅ Binary built successfully (version: $_SHORT_SHA)"
        ls -lh /workspace/eventku-api

  # ── Build Docker image ────────────────────────────────────────────────────
  #  Repository: eventku | Image: eventku-api-staging
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['build-binary']
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging:$_SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '--build-arg=VERSION=$_SHORT_SHA'
      - '.'

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    waitFor: ['push-image']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eventku-api'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging:$_SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=2'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=200'
      - '--timeout=30'
      - '--port=8080'
      - '--set-env-vars=APP_ENV=production,DB_DRIVER=postgres,DB_HOST=/cloudsql/$PROJECT_ID:$_REGION:$_INSTANCE_NAME,DB_NAME=eventku,DB_USER=eventku,DB_PORT=5432,GOOGLE_CLIENT_ID=503551786622-k3uajo9c2d6om6qnqofsa3b47fvo5o6g.apps.googleusercontent.com'
      - '--set-secrets=DB_PASSWORD=database-password:latest,JWT_SECRET=jwt-secret:latest,REFRESH_JWT_SECRET=refresh-jwt-secret:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest'
      - '--add-cloudsql-instances=$PROJECT_ID:$_REGION:$_INSTANCE_NAME'
      - '--service-account=eventku-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--no-cpu-throttling'

# ── Push images via Cloud Build's built-in mechanism (backup) ───────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging:$_SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-api-staging:latest'

# ── Default substitution values ─────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2
  _INSTANCE_NAME: eventku
  _SHORT_SHA: 'latest'

# ── Build options ───────────────────────────────────────────────────────────
options:
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

# =============================================================================
#  Cloud Build Configuration — EVENTKU Next.js Frontend
#
#  Triggers:
#    - Push to main branch (frontend files)
#    - Manual: gcloud builds submit --config gcp/cloudbuild-frontend.yaml \
#              --substitutions=_BACKEND_URL=https://your-api-url.run.app
#
#  Artifact Registry:
#    Repository: eventku (the AR Docker repo, NOT eventku-web-staging)
#    Image name: eventku-web-staging (a Docker image within the eventku repo)
#    Full path:  asia-southeast2-docker.pkg.dev/eventku-494416/eventku/eventku-web-staging
# =============================================================================

steps:
  # ── Build Docker image (includes bun install + Next.js build) ────────────
  #  Repository: eventku | Image: eventku-web-staging
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging:$_SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg=NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '--build-arg=NEXT_PUBLIC_USE_DIRECT_BACKEND=false'
      - '.'

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    waitFor: ['push-image']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eventku-web'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging:$_SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--timeout=300'
      - '--port=3000'
      - '--allow-unauthenticated'

# ── Push images via Cloud Build's built-in mechanism (backup) ───────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging:$_SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/eventku/eventku-web-staging:latest'

# ── Default substitution values ─────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2
  _BACKEND_URL: https://eventku-api-staging-lkfw4e5kna-et.a.run.app
  _SHORT_SHA: 'latest'

# ── Build options ───────────────────────────────────────────────────────────
options:
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

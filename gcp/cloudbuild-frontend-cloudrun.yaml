# =============================================================================
#  Cloud Build Config — Frontend (full build on Cloud Build)
#
#  Cloud Build has full network access, so Docker builds can download
#  npm packages and push to Artifact Registry without issues.
#
#  Usage:
#    gcloud builds submit . --config=gcp/cloudbuild-frontend-cloudrun.yaml \
#      --substitutions=_BACKEND_URL=https://eventku-api-xxx.run.app \
#      --project=eventku-494416
# =============================================================================

steps:
  # ── Build Docker image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_NAME:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '--build-arg=NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '--build-arg=NEXT_PUBLIC_USE_MOCK=false'
      - '--build-arg=NEXT_PUBLIC_DOKU_ENVIRONMENT=$_DOKU_ENV'
      - '--build-arg=NEXT_PUBLIC_DOKU_API_BASE_URL=$_DOKU_API_BASE_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_CHECKOUT_URL=$_DOKU_CHECKOUT_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_CLIENT_ID=$_DOKU_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_DOKU_NOTIFICATION_URL=$_DOKU_NOTIFICATION_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_FINISH_URL=$_DOKU_FINISH_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_ERROR_URL=$_DOKU_ERROR_URL'
      - '--build-arg=NEXT_PUBLIC_DOKU_UNPAYMENT_URL=$_DOKU_UNPAYMENT_URL'
      - '--build-arg=NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID'
      - '--build-arg=NEXT_PUBLIC_PLATFORM_FEE_PERCENTAGE=5'
      - '--build-arg=NEXT_PUBLIC_SETTLEMENT_DAYS=7'
      - '.'

  # ── Push to Artifact Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_NAME:latest']

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    waitFor: ['push-image']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_NAME:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--port=3000'
      - '--set-secrets=NEXTAUTH_SECRET=nextauth-secret:latest'
      - '--set-env-vars=NODE_ENV=production'
      - '--allow-unauthenticated'

# ── Images to push via Cloud Build ────────────────────────────────────────────
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE_NAME:latest'

# ── Substitution variables ────────────────────────────────────────────────────
substitutions:
  _REGION: asia-southeast2
  _REPO: eventku
  _IMAGE_NAME: eventku-web
  _SERVICE_NAME: eventku-web
  _BACKEND_URL: ''
  _DOKU_ENV: sandbox
  _DOKU_API_BASE_URL: https://api-sandbox.doku.com
  _DOKU_CHECKOUT_URL: https://checkout-sandbox.doku.com
  _DOKU_CLIENT_ID: BRN-0252-1778130371806
  _DOKU_NOTIFICATION_URL: ''
  _DOKU_FINISH_URL: https://sheilaon7.eventku.co.id/payment/success
  _DOKU_ERROR_URL: https://sheilaon7.eventku.co.id/payment/error
  _DOKU_UNPAYMENT_URL: https://sheilaon7.eventku.co.id/payment/pending
  _GOOGLE_CLIENT_ID: 503551786622-k3uajo9c2d6om6qnqofsa3b47fvo5o6g.apps.googleusercontent.com

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
